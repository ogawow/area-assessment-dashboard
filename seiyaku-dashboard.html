<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>エリア別 査定・成約ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1420;--panel:#171e2e;--panel2:#1e273b;--line:#2b3650;--txt:#e7ecf5;--sub:#93a1bd;--accent:#4f8cff;--good:#22c55e;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:14px}
.wrap{max-width:1280px;margin:0 auto;padding:24px}
h1{font-size:22px;margin:0 0 4px}
.sub{color:var(--sub);font-size:13px;margin-bottom:20px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.kpi .l{color:var(--sub);font-size:12px}
.kpi .v{font-size:24px;font-weight:700;margin-top:4px}
.kpi .v small{font-size:13px;color:var(--sub);font-weight:400}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:20px}
.panel h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--sub);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 10px;border-radius:8px;font-size:12px}
.hmwrap{overflow-x:auto}
table.hm{border-collapse:collapse;font-size:11px}
table.hm th{color:var(--sub);font-weight:500;padding:4px 6px;position:sticky;white-space:nowrap}
table.hm th.pref{text-align:right;position:sticky;left:0;background:var(--panel);z-index:2;cursor:pointer}
table.hm th.mon{writing-mode:vertical-rl;transform:rotate(180deg);height:52px}
table.hm td{width:34px;height:26px;text-align:center;color:#0b1220;font-weight:600;cursor:pointer;border:1px solid var(--bg)}
table.hm tr:hover th.pref{color:var(--accent)}
table.hm tr.sel th.pref{color:var(--accent);font-weight:700}
.legend{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:11px;margin-top:8px}
.legbar{height:10px;width:160px;border-radius:4px}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
.chartbox{position:relative;height:300px}
.rank{list-style:none;margin:0;padding:0}
.rank li{display:grid;grid-template-columns:24px 90px 1fr auto;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.rank .rk{color:var(--sub);text-align:right}
.rank .bar{height:14px;background:var(--accent);border-radius:4px;min-width:2px}
.rank .val{color:var(--sub);white-space:nowrap}
.tog{display:flex;gap:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>エリア別 査定・成約ダッシュボード</h1>
  <div class="sub" id="period"></div>
  <div style="margin:-8px 0 16px;display:flex;gap:16px;flex-wrap:wrap">
    <a href="index.html" style="color:#FF6900;font-size:13px;text-decoration:none">→ 週別ダッシュボード</a>
    <a href="monthly-dashboard.html" style="color:#FF6900;font-size:13px;text-decoration:none">→ 月別ダッシュボード</a>
  </div>
  <div class="kpis" id="kpis"></div>

  <div class="panel">
    <h2>都道府県 × 月 ヒートマップ
      <div class="controls">
        <div class="tog">
          <button class="btn on" id="mV">査定数</button>
          <button class="btn" id="mR">成約率</button>
        </div>
        <select id="regf"></select>
      </div>
    </h2>
    <div class="hmwrap"><div id="heat"></div></div>
    <div class="legend"><span id="legLo"></span><div class="legbar" id="legbar"></div><span id="legHi"></span><span style="margin-left:10px">行クリックで下の詳細を切替</span></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2><span id="detTitle">詳細推移</span></h2>
      <div class="chartbox"><canvas id="trend"></canvas></div>
    </div>
    <div class="panel">
      <h2>ランキング

          <select id="rankMon"></select>
        </div>
      </h2>
      <ol class="rank" id="rank"></ol>
    </div>
  </div>

const M=D.months, P=D.prefs;
const fmt=n=>n.toLocaleString('ja-JP');
const GV=P.reduce((a,r)=>a+r.tv,0), GC=P.reduce((a,r)=>a+r.tc,0);
const rateArr=r=>r.v.map((v,i)=>v>0?100*r.c[i]/v:null);

// KPIs
document.getElementById('period').textContent='対象期間: '+M[0]+' 〜 '+M[M.length-1]+' ／ '+P.length+'都道府県';
const bestPref=[...P].sort((a,b)=>b.tv-a.tv)[0];
document.getElementById('kpis').innerHTML=[
 ['総査定数',fmt(GV)+' <small>件</small>'],
 ['総成約数',fmt(GC)+' <small>件</small>'],
 ['平均成約率',(100*GC/GV).toFixed(1)+' <small>%</small>'],
 ['最多査定エリア',bestPref.pref+' <small>'+fmt(bestPref.tv)+'件</small>']
].map(k=>`<div class="kpi"><div class="l">${k[0]}</div><div class="v">${k[1]}</div></div>`).join('');

// color scales
function lerp(a,b,t){return a.map((x,i)=>Math.round(x+(b[i]-x)*t))}
function rgb(c){return `rgb(${c[0]},${c[1]},${c[2]})`}
const blueLo=[219,234,254],blueHi=[30,64,175];        // 査定数
const redMid=[254,226,226],grnHi=[22,101,52];         // 成約率
function colV(v,max){const t=max>0?Math.min(1,v/max):0;return rgb(lerp(blueLo,blueHi,Math.sqrt(t)))}
function colR(r){ if(r==null)return '#232c40'; const t=Math.max(0,Math.min(1,(r-70)/30)); return rgb(lerp(redMid,grnHi,t))}

let metric='V', region='all', sel=P[0].pref;

// region filter
const regions=[...new Set(P.map(p=>p.region))];
document.getElementById('regf').innerHTML='<option value="all">全地域</option>'+regions.map(r=>`<option>${r}</option>`).join('');
document.getElementById('regf').onchange=e=>{region=e.target.value;drawHeat()};

function maxV(list){return Math.max(...list.flatMap(r=>r.v))}
function drawHeat(){
  const list=P.filter(p=>region==='all'||p.region===region);
  const mx=maxV(list);
  let h='<table class="hm"><thead><tr><th class="pref"></th>'+M.map(m=>`<th class="mon">${m.slice(2)}</th>`).join('')+'<th class="pref">計</th></tr></thead><tbody>';
  for(const r of list){
    const rr=rateArr(r);
    const cells=M.map((m,i)=>{
      const val=metric==='V'?r.v[i]:rr[i];
      const bg=metric==='V'?colV(r.v[i],mx):colR(rr[i]);
      const disp=metric==='V'?(r.v[i]||''):(rr[i]==null?'':Math.round(rr[i]));
      return `<td style="background:${bg}" title="${r.pref} ${m}\n査定 ${r.v[i]} / 成約 ${r.c[i]}${rr[i]!=null?' / 成約率 '+rr[i].toFixed(1)+'%':''}">${disp}</td>`;
    }).join('');
    const tot=metric==='V'?fmt(r.tv):r.rate+'%';
    h+=`<tr data-p="${r.pref}" class="${r.pref===sel?'sel':''}"><th class="pref" data-p="${r.pref}">${r.pref}</th>${cells}<th class="pref">${tot}</th></tr>`;
  }
  h+='</tbody></table>';
  const el=document.getElementById('heat'); el.innerHTML=h;
  el.querySelectorAll('tr[data-p]').forEach(tr=>tr.onclick=()=>{sel=tr.dataset.p;drawHeat();drawTrend()});
  // legend
  if(metric==='V'){document.getElementById('legLo').textContent='少';document.getElementById('legHi').textContent='多 ('+fmt(mx)+')';document.getElementById('legbar').style.background=`linear-gradient(90deg,${rgb(blueLo)},${rgb(blueHi)})`}
  else{document.getElementById('legLo').textContent='70%';document.getElementById('legHi').textContent='100%';document.getElementById('legbar').style.background=`linear-gradient(90deg,${rgb(redMid)},${rgb(grnHi)})`}
}
document.getElementById('mV').onclick=()=>{metric='V';document.getElementById('mV').classList.add('on');document.getElementById('mR').classList.remove('on');drawHeat()};
document.getElementById('mR').onclick=()=>{metric='R';document.getElementById('mR').classList.add('on');document.getElementById('mV').classList.remove('on');drawHeat()};

// trend chart
let chart;
function drawTrend(){
  const r=P.find(p=>p.pref===sel);
  document.getElementById('detTitle').textContent=sel+' の月別推移（査定数 & 成約率）';
  const rr=rateArr(r).map(x=>x==null?null:+x.toFixed(1));
  const ctx=document.getElementById('trend');
  const cfg={type:'bar',data:{labels:M.map(m=>m.slice(2)),datasets:[
    {type:'bar',label:'査定数',data:r.v,backgroundColor:'#3b82f6',yAxisID:'y',order:2},
    {type:'line',label:'成約率(%)',data:rr,borderColor:'#22c55e',backgroundColor:'#22c55e',tension:.3,yAxisID:'y1',order:1,spanGaps:true,pointRadius:3}
  ]},options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#93a1bd',boxWidth:12}}},
    scales:{
      x:{ticks:{color:'#93a1bd',font:{size:10}},grid:{display:false}},
      y:{position:'left',title:{display:true,text:'査定数',color:'#93a1bd'},ticks:{color:'#93a1bd'},grid:{color:'#2b3650'},beginAtZero:true},
      y1:{position:'right',min:0,max:100,title:{display:true,text:'成約率%',color:'#93a1bd'},ticks:{color:'#93a1bd'},grid:{display:false}}
    }}};
  if(chart){chart.data=cfg.data;chart.options=cfg.options;chart.update()}else{chart=new Chart(ctx,cfg)}
}

// ranking
let rankMetric='V', rankMonth='ALL';
const rs=document.getElementById('rankMon');
rs.innerHTML='<option value="ALL">全期間</option>'+M.map(m=>`<option value="${m}">${m}</option>`).join('');
rs.onchange=e=>{rankMonth=e.target.value;drawRank()};
document.getElementById('rV').onclick=()=>{rankMetric='V';document.getElementById('rV').classList.add('on');document.getElementById('rR').classList.remove('on');drawRank()};
document.getElementById('rR').onclick=()=>{rankMetric='R';document.getElementById('rR').classList.add('on');document.getElementById('rV').classList.remove('on');drawRank()};
function drawRank(){
  let rows=P.map(r=>{
    if(rankMonth==='ALL'){const v=r.tv,c=r.tc;return {p:r.pref,v,c,rate:v?100*c/v:0}}
    const i=M.indexOf(rankMonth);const v=r.v[i],c=r.c[i];return {p:r.pref,v,c,rate:v?100*c/v:0};
  });
  if(rankMetric==='R') rows=rows.filter(x=>x.v>=(rankMonth==='ALL'?50:3));
  rows.sort((a,b)=> rankMetric==='V'? b.v-a.v : b.rate-a.rate);
  rows=rows.slice(0,12);
  const mx=Math.max(...rows.map(x=>rankMetric==='V'?x.v:x.rate),1);
  document.getElementById('rank').innerHTML=rows.map((x,i)=>{
    const val=rankMetric==='V'?x.v:x.rate; const w=100*val/mx;
    const lab=rankMetric==='V'?fmt(x.v)+'件':x.rate.toFixed(1)+'% <span style="opacity:.6">('+fmt(x.v)+')</span>';
    return `<li><span class="rk">${i+1}</span><span style="cursor:pointer" onclick="pick('${x.p}')">${x.p}</span><span class="bar" style="width:${w}%"></span><span class="val">${lab}</span></li>`;
  }).join('');
}
window.pick=p=>{sel=p;drawHeat();drawTrend();document.querySelector('.wrap').scrollIntoView({behavior:'smooth'})};

document.querySelector('.sub#period');
drawHeat();drawTrend();drawRank();
</script>
