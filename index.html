.legend{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:11px;margin-top:8px}

.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px}

.rank li{display:grid;grid-template-columns:24px 90px 1fr auto;align-items:center;gap:8px;padding:5px 0;font-size:12px}

.rank .val{color:var(--sub);white-space:nowrap}

function lerp(a,b,t){return a.map((z,i)=>Math.round(z+(b[i]-z)*t))}
function rgb(c){return 'rgb('+c[0]+','+c[1]+','+c[2]+')'}
const lo=[255,255,255], hi=[255,105,0];
function colV(v,mxv){const t=mxv>0?Math.min(1,v/mxv):0;return rgb(lerp(lo,hi,Math.sqrt(t)))}
let region='all', sel=P[0].pref;

function maxV(list){return Math.max.apply(null,list.reduce((a,r)=>a.concat(r.v),[]))}
function drawHeat(){
  const list=P.filter(p=>region==='all'||p.region===region);
  const mx=maxV(list);
  let h='<table class="hm"><thead><tr><th class="pref"></th>'+W.map(w=>'<th class="mon">'+md(w)+'</th>').join('')+'<th class="tot">計</th></tr></thead><tbody>';
  for(const r of list){
    const cells=W.map((w,i)=>{
      const bg=colV(r.v[i],mx);
      return '<td style="background:'+bg+'" title="'+r.pref+' '+w+'週 査定 '+r.v[i]+' 件">'+(r.v[i]||'')+'</td>';
    }).join('');
    h+='<tr data-p="'+r.pref+'" class="'+(r.pref===sel?'sel':'')+'"><th class="pref" data-p="'+r.pref+'">'+r.pref+'</th>'+cells+'<th class="tot">'+fmt(r.tv)+'</th></tr>';
  }
  h+='</tbody>';
  const colTot=W.map((w,i)=>list.reduce((a,r)=>a+r.v[i],0));
  const gtot=colTot.reduce((a,b)=>a+b,0);
  h+='<tfoot><tr><th class="pref">週合計</th>'+colTot.map(t=>'<td style="background:#f6f7f9;font-weight:700">'+(t||'')+'</td>').join('')+'<th class="tot">'+fmt(gtot)+'</th></tr></tfoot>';
  h+='</table>';
  const el=document.getElementById('heat'); el.innerHTML=h;

  document.getElementById('legHi').textContent='多 ('+fmt(mx)+')';

}
let chart;

  const r=P.find(p=>p.pref===sel);

    }}};

function drawRank(){
