<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>エリア別 査定数ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#ffffff;--panel:#ffffff;--panel2:#f6f7f9;--line:#e6e8ec;--txt:#000000;--sub:#000000;--accent:#FF6900;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:14px}
.wrap{max-width:1280px;margin:0 auto;padding:24px}
h1{font-size:22px;margin:0 0 4px}
.sub{color:var(--sub);font-size:13px;margin-bottom:20px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.kpi .l{color:var(--sub);font-size:12px}
.kpi .v{font-size:24px;font-weight:700;margin-top:4px}
.kpi .v small{font-size:13px;color:var(--sub);font-weight:400}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:20px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.panel h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
select{background:#fff;border:1px solid var(--line);color:var(--txt);padding:6px 10px;border-radius:8px;font-size:12px}
.hmwrap{overflow-x:auto}
table.hm{border-collapse:collapse;font-size:11px}
table.hm th{color:var(--sub);font-weight:500;padding:4px 6px;white-space:nowrap}
table.hm th.pref{text-align:right;position:sticky;left:0;background:#fff;z-index:2;cursor:pointer}
table.hm th.mon{writing-mode:vertical-rl;transform:rotate(180deg);height:52px}
table.hm td{width:34px;height:26px;text-align:center;font-weight:600;cursor:pointer;border:1px solid #fff}
table.hm tr:hover th.pref{color:var(--accent)}
table.hm tr.sel th.pref{color:var(--accent);font-weight:700}
.legend{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:11px;margin-top:8px}
.legbar{height:10px;width:160px;border-radius:4px;border:1px solid var(--line)}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
.chartbox{position:relative;height:300px}
.rank{list-style:none;margin:0;padding:0}
.rank li{display:grid;grid-template-columns:24px 90px 1fr auto;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.rank .rk{color:var(--sub);text-align:right}
.rank .bar{height:14px;background:var(--accent);border-radius:4px;min-width:2px}
.rank .val{color:var(--sub);white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <h1>エリア別 査定数ダッシュボード</h1>
  <div class="sub" id="period"></div>
  <div style="margin:-8px 0 16px"><a href="seiyaku-dashboard.html" style="color:#FF6900;font-size:13px;text-decoration:none">→ 査定・成約ダッシュボードを見る</a></div>
  <div class="kpis" id="kpis"></div>
  <div class="panel">
    <h2>都道府県 × 月 ヒートマップ（査定数）
      <div class="controls"><select id="regf"></select></div>
    </h2>
    <div class="hmwrap"><div id="heat"></div></div>
    <div class="legend"><span id="legLo">0</span><div class="legbar" id="legbar"></div><span id="legHi"></span><span style="margin-left:10px">行クリックで下の詳細を切替</span></div>
  </div>
  <div class="grid2">
    <div class="panel">
      <h2><span id="detTitle">詳細推移</span></h2>
      <div class="chartbox"><canvas id="trend"></canvas></div>
    </div>
    <div class="panel">
      <h2>ランキング（査定数）
        <div class="controls"><select id="rankMon"></select></div>
      </h2>
      <ol class="rank" id="rank"></ol>
    </div>
  </div>
  <div class="sub" style="margin-top:8px">※ area_code（郵便番号上3桁）を都道府県に集約。全国合計 査定 51,555 件（郵便番号000の1件を除く）。</div>
</div>

const M=D.months, P=D.prefs;
const fmt=n=>n.toLocaleString('ja-JP');
const GV=P.reduce((a,r)=>a+r.tv,0);
document.getElementById('period').textContent='対象期間: '+M[0]+' 〜 '+M[M.length-1]+' ／ '+P.length+'都道府県';
const bestPref=[...P].sort((a,b)=>b.tv-a.tv)[0];
document.getElementById('kpis').innerHTML=[
 ['総査定数',fmt(GV)+' <small>件</small>'],
 ['月平均',fmt(Math.round(GV/M.length))+' <small>件/月</small>'],
 ['最多査定エリア',bestPref.pref+' <small>'+fmt(bestPref.tv)+'件</small>'],
 ['対象都道府県',P.length+' <small>件</small>']
].map(k=>'<div class="kpi"><div class="l">'+k[0]+'</div><div class="v">'+k[1]+'</div></div>').join('');
function lerp(a,b,t){return a.map((z,i)=>Math.round(z+(b[i]-z)*t))}
function rgb(c){return 'rgb('+c[0]+','+c[1]+','+c[2]+')'}
const lo=[255,255,255], hi=[255,105,0];
function colV(v,mxv){const t=mxv>0?Math.min(1,v/mxv):0;return rgb(lerp(lo,hi,Math.sqrt(t)))}
function txtCol(v,mxv){const t=mxv>0?Math.min(1,v/mxv):0;return '#000000'}
let region='all', sel=P[0].pref;
const regions=[...new Set(P.map(p=>p.region))];
document.getElementById('regf').innerHTML='<option value="all">全地域</option>'+regions.map(r=>'<option>'+r+'</option>').join('');
document.getElementById('regf').onchange=e=>{region=e.target.value;drawHeat()};
function maxV(list){return Math.max.apply(null,list.reduce((a,r)=>a.concat(r.v),[]))}
function drawHeat(){
  const list=P.filter(p=>region==='all'||p.region===region);
  const mx=maxV(list);
  let h='<table class="hm"><thead><tr><th class="pref"></th>'+M.map(m=>'<th class="mon">'+m.slice(2)+'</th>').join('')+'<th class="pref">計</th></tr></thead><tbody>';
  for(const r of list){
    const cells=M.map((m,i)=>{
      const bg=colV(r.v[i],mx), fg=txtCol(r.v[i],mx);
      return '<td style="background:'+bg+';color:'+fg+'" title="'+r.pref+' '+m+' 査定 '+r.v[i]+' 件">'+(r.v[i]||'')+'</td>';
    }).join('');
    h+='<tr data-p="'+r.pref+'" class="'+(r.pref===sel?'sel':'')+'"><th class="pref" data-p="'+r.pref+'">'+r.pref+'</th>'+cells+'<th class="pref">'+fmt(r.tv)+'</th></tr>';
  }
  h+='</tbody></table>';
  const el=document.getElementById('heat'); el.innerHTML=h;
  el.querySelectorAll('tr[data-p]').forEach(tr=>tr.onclick=()=>{sel=tr.dataset.p;drawHeat();drawTrend()});
  document.getElementById('legHi').textContent='多 ('+fmt(mx)+')';
  document.getElementById('legbar').style.background='linear-gradient(90deg,'+rgb(lo)+','+rgb(hi)+')';
}
let chart;
function drawTrend(){
  const r=P.find(p=>p.pref===sel);
  document.getElementById('detTitle').textContent=sel+' の月別査定数';
  const ctx=document.getElementById('trend');
  const cfg={type:'bar',data:{labels:M.map(m=>m.slice(2)),datasets:[
    {label:'査定数',data:r.v,backgroundColor:'#FF6900',borderRadius:3}
  ]},options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#000000',boxWidth:12}}},
    scales:{
      x:{ticks:{color:'#000000',font:{size:10}},grid:{display:false}},
      y:{title:{display:true,text:'査定数',color:'#000000'},ticks:{color:'#000000'},grid:{color:'#eef0f3'},beginAtZero:true}
    }}};
  if(typeof Chart==='undefined'){return}
  if(chart){chart.data=cfg.data;chart.options=cfg.options;chart.update()}else{chart=new Chart(ctx,cfg)}
}
let rankMonth='ALL';
const rs=document.getElementById('rankMon');
rs.innerHTML='<option value="ALL">全期間</option>'+M.map(m=>'<option value="'+m+'">'+m+'</option>').join('');
rs.onchange=e=>{rankMonth=e.target.value;drawRank()};
function drawRank(){
  let rows=P.map(r=>{
    if(rankMonth==='ALL')return {p:r.pref,v:r.tv};
    const i=M.indexOf(rankMonth);return {p:r.pref,v:r.v[i]};
  });
  rows.sort((a,b)=>b.v-a.v); rows=rows.slice(0,12);
  const mx=Math.max.apply(null,rows.map(z=>z.v).concat([1]));
  document.getElementById('rank').innerHTML=rows.map((z,i)=>{
    const w=100*z.v/mx;
    return '<li><span class="rk">'+(i+1)+'</span><span style="cursor:pointer" onclick="pick(\''+z.p+'\')">'+z.p+'</span><span class="bar" style="width:'+w+'%"></span><span class="val">'+fmt(z.v)+'件</span></li>';
  }).join('');
}
window.pick=p=>{sel=p;drawHeat();drawTrend();document.querySelector('.wrap').scrollIntoView({behavior:'smooth'})};
drawHeat();drawTrend();drawRank();
</script>
</body></html>
